# 운영 프로파일: MySQL + 시더 절대 금지
spring:
  datasource:
    # 운영 비밀정보는 환경변수로 주입한다 (코드/형상관리에 평문 노출 금지).
    url: ${DB_URL:jdbc:mysql://localhost:3306/taskmanager?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      # 운영 스키마는 마이그레이션 SQL(db/migration/mysql/*)로 관리하고,
      # 앱은 엔티티-스키마 일치 여부만 검증한다 (자동 변경 금지).
      ddl-auto: validate
    show-sql: false

app:
  seed:
    enabled: false               # 운영 DB에 더미 데이터 적재는 사고이므로 명시적으로 차단
