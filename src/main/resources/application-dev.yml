# 개발 프로파일: 인메모리 H2 + 더미 시더 활성화
spring:
  datasource:
    # MODE=MySQL: H2를 MySQL 방언에 최대한 맞춰 운영 환경과의 SQL 차이를 줄인다.
    # DB_CLOSE_DELAY=-1: 커넥션이 모두 닫혀도 JVM 종료 전까지 인메모리 DB를 유지한다.
    url: jdbc:h2:mem:taskmanager;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      # dev는 매 기동마다 스키마를 새로 만든다 → 시더가 항상 깨끗한 상태에서 시작.
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate.format_sql: true
  h2:
    console:
      enabled: true              # http://localhost:8080/h2-console 로 데이터 직접 확인 가능

app:
  seed:
    enabled: true                # dev에서만 더미 데이터 시딩 허용
